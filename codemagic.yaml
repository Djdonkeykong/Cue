workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic_ASC_Key   # Navn pa integrasjonen i Codemagic dashboard

    environment:
      groups:
        - cue-group
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.cueapplication.cueapplication
      vars:
        BUNDLE_ID: com.cueapplication.cueapplication
        XCODE_SCHEME: Cue

    scripts:
      - name: Install xcodegen
        script: brew install xcodegen

      - name: Place GoogleService-Info.plist
        script: |
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > App/GoogleService-Info.plist

      - name: Generate app icon
        script: |
          pip3 install Pillow --quiet
          python3 - <<'PYEOF'
          from PIL import Image
          import os

          size = 1024
          bg = Image.new('RGBA', (size, size), (245, 207, 223, 255))

          logo_path = 'Resources/cue-logo.png'
          if os.path.exists(logo_path):
              logo = Image.open(logo_path).convert('RGBA')

              # Make white/near-white pixels transparent
              data = logo.getdata()
              new_data = []
              for r, g, b, a in data:
                  if r > 200 and g > 200 and b > 200:
                      new_data.append((r, g, b, 0))
                  else:
                      new_data.append((r, g, b, a))
              logo.putdata(new_data)

              # Scale to 55% of icon width, centered
              target_w = int(size * 0.55)
              ratio = target_w / logo.width
              target_h = int(logo.height * ratio)
              logo = logo.resize((target_w, target_h), Image.LANCZOS)

              x = (size - target_w) // 2
              y = (size - target_h) // 2
              bg.paste(logo, (x, y), logo)
              print('Icon generated with logo')
          else:
              print('Logo not found, using flat color fallback')

          os.makedirs('Assets.xcassets/AppIcon.appiconset', exist_ok=True)
          bg.convert('RGB').save('Assets.xcassets/AppIcon.appiconset/AppIcon.png')
          PYEOF

      - name: Generate Xcode project
        script: |
          sed -i "s/CURRENT_PROJECT_VERSION: \"[0-9]*\"/CURRENT_PROJECT_VERSION: \"$BUILD_NUMBER\"/" project.yml
          xcodegen generate --spec project.yml

      - name: Set up keychain
        script: keychain initialize

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Resolve SPM packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -scheme "$XCODE_SCHEME" \
            -project Cue.xcodeproj \
            -clonedSourcePackagesDirPath .spm-cache

      - name: Build and archive
        script: |
          set -o pipefail
          PROFILE_PATH=$(find "$HOME/Library/MobileDevice/Provisioning Profiles" -name "*.mobileprovision" -maxdepth 1 | head -1)
          echo "Profile path: $PROFILE_PATH"
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | python3 -c "import sys,plistlib; print(plistlib.loads(sys.stdin.buffer.read())['UUID'])")
          echo "Profile UUID: $PROFILE_UUID"
          echo "$PROFILE_UUID" > /tmp/.cue_profile_uuid
          xcodebuild archive \
            -scheme "$XCODE_SCHEME" \
            -project Cue.xcodeproj \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/Cue.xcarchive" \
            -destination "generic/platform=iOS" \
            -clonedSourcePackagesDirPath .spm-cache \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            | xcpretty

      - name: Export IPA
        script: |
          PROFILE_UUID=$(cat /tmp/.cue_profile_uuid)
          echo "Exporting with profile UUID: $PROFILE_UUID"
          python3 -c "
          import plistlib, sys
          plist = {
              'method': 'app-store-connect',
              'signingStyle': 'manual',
              'provisioningProfiles': {'com.cueapplication.cueapplication': sys.argv[1]}
          }
          with open('/tmp/ExportOptions.plist', 'wb') as f:
              plistlib.dump(plist, f)
          print('ExportOptions.plist written')
          " "$PROFILE_UUID"
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/Cue.xcarchive" \
            -exportPath "$CM_BUILD_DIR/export" \
            -exportOptionsPlist /tmp/ExportOptions.plist

    artifacts:
      - $CM_BUILD_DIR/export/*.ipa
      - $CM_BUILD_DIR/**/*.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
