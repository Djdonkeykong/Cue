name: Cue

options:
  bundleIdPrefix: com.skinscan
  deploymentTarget:
    iOS: "26.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_BITCODE: "NO"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"

targets:
  Cue:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App
      - path: Core
      - path: DesignSystem
      - path: Features
      - path: Models
      - path: Services
      - path: Assets.xcassets
      - path: Fonts
    info:
      path: Cue-Info.plist
      properties:
        CFBundleDisplayName: Cue
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: LaunchBackground
        NSCameraUsageDescription: "Cue uses the camera to scan ingredient lists"
        NSPhotoLibraryUsageDescription: "Cue needs access to photos to analyze ingredients"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - "com.googleusercontent.apps.732726178398-1uvselk60cjjsd8md0n48stqe0t3apmu"
        UIBackgroundModes:
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIApplicationSupportsIndirectInputEvents: true
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - RobotoCondensed-Bold.ttf
          - RobotoCondensed-Regular.ttf
    entitlements:
      path: Cue.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cueapplication.cueapplication
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "iPhone Distribution"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Cue-Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Purchases
        product: RevenueCat
      - package: Purchases
        product: RevenueCatUI
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseMessaging
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  Purchases:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"
